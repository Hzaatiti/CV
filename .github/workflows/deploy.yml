name: Build CV & deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate resume.json from cv.md
        run: |
          pip install pyyaml
          python build.py

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDF
        run: typst compile template.typ site/cv.pdf --root .

      - name: Build page previews (PNG, one per page)
        run: typst compile template.typ "site/cv-{p}.png" --ppi 200 --root .

      - name: Inject page images into index.html
        run: |
          imgs=""
          for f in $(ls site/cv-*.png | sort -V); do
            name=$(basename "$f")
            imgs="$imgs<img class=\"page\" src=\"./$name\" alt=\"CV page\" loading=\"lazy\">"
          done
          # Replace the placeholder marker with the generated <img> tags
          python3 - "$imgs" <<'PY'
          import sys, pathlib
          imgs = sys.argv[1]
          p = pathlib.Path("site/index.html")
          html = p.read_text(encoding="utf-8")
          html = html.replace("<!-- CV_PAGES -->", imgs)
          p.write_text(html, encoding="utf-8")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
