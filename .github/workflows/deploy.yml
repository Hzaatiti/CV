name: Build CV & deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate resume.json from cv.md
        run: |
          pip install pyyaml
          python build.py

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Build PDF
        run: |
          PDF_NAME=$(cat site/pdfname.txt)
          typst compile template.typ "site/$PDF_NAME" --root .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
